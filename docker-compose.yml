# ============================================================================
#  BookingOS — local development infrastructure
#  Brings up PostgreSQL + Redis. App services (api/web) run via `pnpm dev`.
#  Production compose lives in docs/SETUP.md.
# ============================================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: bookingos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookingos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookingos}
      POSTGRES_DB: ${POSTGRES_DB:-bookingos}
    ports:
      - "5432:5432"
    volumes:
      - bookingos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookingos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bookingos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - bookingos_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bookingos_pgdata:
  bookingos_redisdata:
